<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edição Jurídica - CODEGO</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='imagens_empresas/asentjur.png') }}" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-[#002b5c] p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-200">
            
            <div class="bg-red-600 p-6 text-white flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold flex items-center gap-2">
                        <i data-lucide="gavel"></i> Atualização de Dados Jurídicos
                    </h2>
                    <p class="text-red-100 text-sm italic">Campos administrativos protegidos (somente leitura)</p>
                </div>
                <a href="{{ url_for('edicao.selecionar_edicao', modo='jur') }}" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition-all text-sm font-bold">
                    VOLTAR
                </a>
            </div>

            <form id="formEditarJur" action="{{ url_for('edicao.editar_jur', empresa_id=empresa_id) }}" method="POST" class="p-8">
                
                <div class="mb-10">
                    <h3 class="text-[#002b5c] font-bold border-b pb-2 mb-6 flex items-center gap-2">
                        <i data-lucide="building-2" class="w-5 h-5"></i> 
                        Empresa: <span class="text-red-600 ml-1">{{ dados['empresa'] if dados['empresa'] else 'Não informada' }}</span>
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        {% for col in colunas_fixas %}
                        <div class="bg-gray-50 p-2 rounded border border-gray-100">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase truncate" title="{{ col }}">
                                {{ labels.get(col, col) }}
                            </label>
                            <input type="text" value="{{ dados[col] or '-' }}" readonly 
                                class="w-full bg-transparent border-none text-sm text-gray-700 font-medium focus:ring-0 cursor-not-allowed">
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="bg-red-50 p-6 rounded-xl border border-red-100 shadow-inner">
                    <h3 class="text-red-700 font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="edit-3" class="w-5 h-5"></i> Campos Editáveis (Jurídico)
                    </h3>
                    
                    <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-3">
                    Processos Judiciais
                    </label>

                    <div id="lista-processos" class="space-y-4">

                    {% for p in processos %}
                    <div class="border border-red-200 rounded-xl overflow-hidden processo-card">

                        <button type="button"
                        onclick="toggleProcesso(this)"
                        class="w-full flex justify-between items-center bg-red-100 px-4 py-3 font-bold text-red-800">

                            Processo {{ loop.index }} — {{ p.numero_processo if p.numero_processo else 'Novo processo' }}

                            <i data-lucide="chevron-down" class="icone-toggle w-5 h-5"></i>

                        </button>

                        <div class="conteudo-processo p-4 space-y-3 hidden">

                            <label class="text-sm font-bold">Número do processo</label>
                            <input type="text"
                            name="numero_processo[]"
                            value="{{ p.numero_processo }}"
                            class="w-full p-2 border rounded">

                            <label class="text-sm font-bold">Tipo de Processo</label>
                            <select name="tipo_processo[]" class="w-full p-2 border rounded tipo-processo">
                                <option value="">Selecione...</option>
                                <option value="trabalhista" {% if p.tipo_processo == 'trabalhista' %}selected{% endif %}>Trabalhista</option>
                                <option value="civel" {% if p.tipo_processo == 'civel' %}selected{% endif %}>Cível</option>
                                <option value="criminal" {% if p.tipo_processo == 'criminal' %}selected{% endif %}>Criminal</option>
                            </select>

                            <label class="text-sm font-bold">Status</label>
                            <select name="status[]" class="w-full p-2 border rounded">
                                <option value="">Selecione...</option>
                                {% for opcao in status_opcoes %}
                                    <option value="{{ opcao }}"
                                    {% if p.status == opcao %}selected{% endif %}>
                                    {{ opcao }}
                                </option>
                                {% endfor %}
                            </select>

                            <label class="text-sm font-bold">Assunto Judicial</label>
                            <textarea
                            name="assunto_judicial[]"
                            class="w-full p-2 border rounded">{{ p.assunto_judicial }}</textarea>

                            <label class="text-sm font-bold">Valor da causa</label>
                            <input type="text"
                            name="valor_da_causa[]"
                            value="{{ p.valor_da_causa }}"
                            class="w-full p-2 border rounded">

                            <div class="flex items-center gap-2 mt-2">
                                <input type="checkbox"
                                    name="recurso_acionado[]"
                                    class="recurso-checkbox"
                                    {% if p.recurso_acionado %}checked{% endif %}>
                                <label class="text-sm font-bold">Recurso acionado?</label>
                            </div>

                            <div class="campo-recurso mt-2 {% if not p.recurso_acionado %}hidden{% endif %}">
                                <label class="text-sm font-bold">Tipo de Recurso</label>
                                <select name="tipo_recurso[]" class="w-full p-2 border rounded">
                                    <option value="">Selecione...</option>
                                    <option value="apelacao" {% if p.tipo_recurso == 'apelacao' %}selected{% endif %}>Apelação</option>
                                    <option value="agravo" {% if p.tipo_recurso == 'agravo' %}selected{% endif %}>Agravo</option>
                                    <option value="embargos" {% if p.tipo_recurso == 'embargos' %}selected{% endif %}>Embargos</option>
                                </select>
                            </div>

                            <button type="button"
                            onclick="removerProcesso(this)"
                            class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded">
                            Remover processo
                            </button>

                        </div>

                    </div>
                    {% endfor %}

                    </div>

                    <button type="button"
                    onclick="adicionarProcesso()"
                    class="mt-4 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded flex items-center gap-2">

                    <i data-lucide="plus"></i>
                    Adicionar processo
                    </button>

                    </div>

                </div>

                <div class="mt-8 flex justify-end gap-4 border-t pt-6">
                    <button type="button" onclick="window.location.href='/selecionar_edicao/jur'" 
                        class="px-8 py-3 rounded-lg font-bold text-gray-500 hover:bg-gray-100 transition-all">
                        CANCELAR
                    </button>
                    <button type="submit" 
                        class="bg-red-600 hover:bg-red-700 text-white px-12 py-3 rounded-lg font-bold shadow-lg transform transition active:scale-95 flex items-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> SALVAR ALTERAÇÕES JURÍDICAS
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Inicializa ícones
        lucide.createIcons();

        // Trava para o Enter não enviar o formulário acidentalmente
        const formJur = document.getElementById('formEditarJur');
        
        formJur.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                // Permite o Enter somente em textareas (campos de assunto/observações)
                if (e.target.nodeName !== 'TEXTAREA') {
                    e.preventDefault();
                    return false;
                }
            }
        });

        function adicionarProcesso(){

        let container = document.getElementById("lista-processos");

        let numero = container.children.length + 1;

        let div = document.createElement("div");

        div.className = "border border-red-200 rounded-xl overflow-hidden processo-card";

        div.innerHTML = `

        <button type="button"
        onclick="toggleProcesso(this)"
        class="w-full flex justify-between items-center bg-red-100 px-4 py-3 font-bold text-red-800">

        Processo ${numero} — Novo processo

        <i data-lucide="chevron-down" class="icone-toggle w-5 h-5"></i>

        </button>

        <div class="conteudo-processo p-4 space-y-3">

        <label class="text-sm font-bold">Número do processo</label>
        <input type="text" name="numero_processo[]" class="w-full p-2 border rounded">

        <label class="text-sm font-bold">Tipo de Processo</label>
        <select name="tipo_processo[]" class="w-full p-2 border rounded tipo-processo">
        <option value="">Selecione...</option>
        <option value="trabalhista">Trabalhista</option>
        <option value="civel">Cível</option>
        <option value="criminal">Criminal</option>
        </select>

        <label class="text-sm font-bold">Status</label>
        <select name="status[]" class="w-full p-2 border rounded">
        <option value="">Selecione...</option>
        <option value="ATIVO">ATIVO</option>
        <option value="ARQUIVADO">ARQUIVADO</option>
        <option value="SUSPENSO">SUSPENSO</option>
        </select>

        <label class="text-sm font-bold">Assunto Judicial</label>
        <textarea name="assunto_judicial[]" class="w-full p-2 border rounded"></textarea>

        <label class="text-sm font-bold">Valor da causa</label>
        <input type="text" name="valor_da_causa[]" class="w-full p-2 border rounded">

        <div class="flex items-center gap-2 mt-2">
        <input type="checkbox"
        name="recurso_acionado[]"
        class="recurso-checkbox">
        <input type="hidden" name="recurso_acionado[]" value="0">
        <input type="checkbox" name="recurso_acionado[]" value="1">
        <label class="text-sm font-bold">Recurso acionado?</label>
        </div>

        <div class="campo-recurso mt-2">
        <label class="text-sm font-bold">Tipo de Recurso</label>
        <select name="tipo_recurso[]" class="w-full p-2 border rounded">
        <option value="">Selecione...</option>
        <option value="apelacao">Apelação</option>
        <option value="agravo">Agravo</option>
        <option value="embargos">Embargos</option>
        </select>
        </div>

        <button type="button"
        onclick="removerProcesso(this)"
        class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded">
        Remover processo
        </button>

        </div>
        `;

        container.appendChild(div);

        lucide.createIcons();

        }

        function removerProcesso(botao){
        
        let card = botao.closest(".processo-card");

        card.remove();

        }

        function toggleProcesso(botao){

        let card = botao.parentElement;
        let conteudo = card.querySelector(".conteudo-processo");
        let icone = botao.querySelector(".icone-toggle");

        conteudo.classList.toggle("hidden");

        icone.classList.toggle("rotate-180");

        }

        document.addEventListener("change", function(e){

        // CHECKBOX DE RECURSO
        if(e.target.classList.contains("recurso-checkbox")){

            let card = e.target.closest(".processo-card");
            let campo = card.querySelector(".campo-recurso");

            if(e.target.checked){
                campo.classList.remove("hidden");
            } else {
                campo.classList.add("hidden");
            }

        }

        // TIPO DE PROCESSO
        if(e.target.classList.contains("tipo-processo")){

            let card = e.target.closest(".processo-card");
            let checkbox = card.querySelector(".recurso-checkbox");
            let campo = card.querySelector(".campo-recurso");
        }

        });
    </script>
</body>
</html>
