{% if lista %}
    <div class="space-y-3">
        {% for evento in lista %}
        <div class="border border-gray-200 rounded-lg p-4 bg-gray-50">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-2">
                <p class="text-sm font-bold text-[#002b5c] break-words">{{ evento.titulo or evento.categoria or '-' }}</p>
                <p class="text-xs font-bold uppercase text-gray-500">{{ evento.data_evento or evento.created_at or '-' }}</p>
            </div>
            <p class="text-sm text-gray-700 whitespace-pre-wrap break-words">{{ evento.descricao or '-' }}</p>
        </div>
        {% endfor %}
    </div>
{% else %}
    <div class="border border-dashed border-gray-300 rounded-lg p-8 text-center">
        <i data-lucide="inbox" class="w-10 h-10 text-gray-300 mx-auto mb-3"></i>
        <p class="text-sm text-gray-500">Nenhum registro encontrado.</p>
    </div>
{% endif %}
