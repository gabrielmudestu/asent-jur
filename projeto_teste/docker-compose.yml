services:
  web:
    build: .
    container_name: codego_app
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mysql:8
    container_name: mysql_sistema
    environment:
      MYSQL_ROOT_PASSWORD: Joaolopes05
      MYSQL_DATABASE: codego_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_codego
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/app/uploads
      - ./app/static:/app/static

volumes:
  mysql_data: